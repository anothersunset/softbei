<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>OpsGuard 智御 · OS Security Operations Console</title>
<style>
  @property --ang { syntax: '<angle>'; inherits: false; initial-value: 0deg; }
  :root{
    --bg:#0a0b0d; --surface:#101216; --surface-2:#15171c; --raised:#1b1e24;
    --line:#23262d; --line-soft:#191b20;
    --text:#e8eaed; --dim:#9aa0a8; --faint:#646a72;
    --accent:#7c93c8; --accent-soft:rgba(124,147,200,.16);
    --safe:#5aa37a; --review:#c39a4e; --block:#cc6b78;
    --r:13px;
  }
  *{box-sizing:border-box}
  html{-webkit-text-size-adjust:100%}
  body{margin:0;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;
    -webkit-font-smoothing:antialiased;
    background-image:radial-gradient(1100px 520px at 82% -12%, rgba(124,147,200,.07), transparent 62%);
    background-attachment:fixed}
  .serif{font-family:'Iowan Old Style','Palatino Linotype','Baskerville','Source Han Serif SC','Songti SC','Times New Roman',serif}
  .mono{font-family:ui-monospace,'SFMono-Regular','JetBrains Mono','Cascadia Code',Consolas,monospace}
  svg{display:block}
  .wrap{max-width:1280px;margin:0 auto;padding:30px 26px 40px}
  .top{display:flex;justify-content:space-between;align-items:flex-end;gap:24px;padding-bottom:20px;border-bottom:1px solid var(--line)}
  .wm{display:flex;align-items:center;gap:14px}
  .wm .mark{width:42px;height:42px;border:1px solid var(--line);border-radius:11px;display:grid;place-items:center;
    color:var(--accent);background:var(--surface)}
  .wm .mark svg{width:22px;height:22px}
  .wm h1{font-size:22px;margin:0;font-weight:600;letter-spacing:.3px}
  .wm .sub{font-size:11.5px;color:var(--faint);margin-top:4px;letter-spacing:.4px}
  .meta{display:flex;gap:18px;align-items:center}
  .meta .m{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--dim);white-space:nowrap}
  .meta .dot{width:6px;height:6px;border-radius:50%;background:var(--faint)}
  .meta .dot.on{background:var(--safe)} .meta .dot.warn{background:var(--review)}
  .grid{display:grid;grid-template-columns:352px 1fr;gap:18px;margin-top:20px}
  @media(max-width:980px){.grid{grid-template-columns:1fr}}
  .card{border:1px solid var(--line);border-radius:var(--r);background:var(--surface)}
  .card+.card{margin-top:16px}
  .ch{display:flex;align-items:center;gap:10px;padding:13px 16px;border-bottom:1px solid var(--line)}
  .ch .ico{color:var(--dim);display:grid;place-items:center}
  .ch .ico svg{width:15px;height:15px}
  .ch h2{font-size:10.5px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--dim);margin:0}
  .cb{padding:16px}
  .lbl{font-size:10px;letter-spacing:1.3px;text-transform:uppercase;color:var(--faint);margin:0 0 10px;display:flex;align-items:center;gap:8px}
  .lbl svg{width:13px;height:13px}
  textarea{width:100%;min-height:94px;resize:vertical;border:1px solid var(--line);border-radius:11px;
    background:var(--surface-2);color:var(--text);padding:12px 13px;font-size:14px;font-family:inherit;line-height:1.55;outline:none;transition:border-color .18s, box-shadow .18s}
  textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
  textarea::placeholder{color:var(--faint)}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;width:100%;border:1px solid transparent;
    border-radius:10px;padding:11px 14px;font-size:13.5px;font-weight:600;cursor:pointer;font-family:inherit;transition:.18s;letter-spacing:.2px}
  .btn svg{width:16px;height:16px}
  .btn:disabled{opacity:.45;cursor:not-allowed}
  .btn-primary{background:var(--text);color:#0a0b0d}
  .btn-primary:hover{background:#fff}
  .btn-warn{background:transparent;border-color:var(--line);color:var(--review)}
  .btn-warn{border-color:color-mix(in srgb,var(--review) 55%,var(--line))}
  .btn-warn:hover{background:color-mix(in srgb,var(--review) 12%,transparent)}
  .row{margin-top:10px}
  .scl{font-size:10px;letter-spacing:1.3px;text-transform:uppercase;color:var(--faint);margin:20px 0 10px}
  .scen{display:grid;gap:8px}
  .scen button{display:flex;align-items:center;gap:11px;text-align:left;border:1px solid var(--line);background:var(--surface-2);
    color:var(--text);border-radius:9px;padding:10px 12px;cursor:pointer;font-size:13px;transition:.18s;font-family:inherit}
  .scen button:hover{border-color:color-mix(in srgb,var(--accent) 50%,var(--line));background:var(--raised)}
  .scen .tag{font-size:9px;font-weight:700;letter-spacing:.7px;padding:3px 7px;border-radius:5px}
  .tag.safe{color:var(--safe);background:color-mix(in srgb,var(--safe) 15%,transparent)}
  .tag.review{color:var(--review);background:color-mix(in srgb,var(--review) 15%,transparent)}
  .tag.block{color:var(--block);background:color-mix(in srgb,var(--block) 15%,transparent)}
  .kpi{display:flex}
  .kpi .k{flex:1;text-align:center;padding:2px 2px;border-right:1px solid var(--line)}
  .kpi .k:last-child{border-right:none}
  .kpi .n{font-size:25px;font-weight:600;font-variant-numeric:tabular-nums;letter-spacing:.5px;line-height:1.1}
  .kpi .t{font-size:9.5px;letter-spacing:1.2px;text-transform:uppercase;color:var(--faint);margin-top:6px}
  .kpi .k.total .n{color:var(--text)} .kpi .k.safe .n{color:var(--safe)}
  .kpi .k.review .n{color:var(--review)} .kpi .k.block .n{color:var(--block)}
  .chips{display:flex;flex-wrap:wrap;gap:8px}
  .chip{display:flex;align-items:center;gap:8px;font-size:12.5px;padding:7px 11px;border:1px solid var(--line);
    border-radius:8px;background:var(--surface-2)}
  .chip .cd{width:5px;height:5px;border-radius:50%;background:var(--accent);flex-shrink:0}
  .chip .nm{font-family:ui-monospace,'SFMono-Regular',Consolas,monospace;font-size:12px}
  .loader{height:2px;border-radius:2px;overflow:hidden;background:var(--line);margin-bottom:16px;opacity:0;transition:opacity .2s}
  .loader.on{opacity:1}
  .loader>i{display:block;height:100%;width:38%;background:linear-gradient(90deg,transparent,var(--accent),transparent);
    transform:translateX(-100%);animation:slide 1.15s cubic-bezier(.4,0,.2,1) infinite}
  @keyframes slide{to{transform:translateX(360%)}}
  .pipe{display:flex}
  .stage{flex:1;text-align:center;position:relative;padding-top:4px}
  .stage::after{content:'';position:absolute;top:22px;left:50%;width:100%;height:1px;background:var(--line);z-index:0}
  .stage:last-child::after{display:none}
  .stage .node{position:relative;z-index:1;width:36px;height:36px;margin:0 auto 10px;border-radius:10px;
    border:1px solid var(--line);background:var(--surface);display:grid;place-items:center;color:var(--faint);transition:.3s}
  .stage .node svg{width:17px;height:17px}
  .stage .nm{font-size:10.5px;color:var(--faint);letter-spacing:.2px}
  .stage.done .node{color:var(--safe);border-color:color-mix(in srgb,var(--safe) 50%,var(--line));background:color-mix(in srgb,var(--safe) 11%,var(--surface))}
  .stage.done::after{background:color-mix(in srgb,var(--safe) 42%,var(--line))}
  .stage.done .nm{color:var(--dim)}
  .stage.active .node{color:var(--accent);border-color:var(--accent);box-shadow:0 0 0 4px var(--accent-soft)}
  .stage.active .node::before{content:'';position:absolute;inset:-4px;border-radius:13px;padding:1px;
    background:conic-gradient(from var(--ang),transparent 30%,var(--accent));
    -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);-webkit-mask-composite:xor;
    mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);mask-composite:exclude;
    animation:spin 1.6s linear infinite}
  .stage.active .nm{color:var(--text)}
  .stage.block .node{color:var(--block);border-color:var(--block);background:color-mix(in srgb,var(--block) 12%,var(--surface))}
  .stage.block .nm{color:var(--block)}
  @keyframes spin{to{--ang:360deg}}
  @media(prefers-reduced-motion:reduce){.stage.active .node::before,.loader>i{animation:none}}
  .tabs{display:flex;gap:2px;padding:0 16px;border-bottom:1px solid var(--line)}
  .tab{padding:13px 11px;font-size:10.5px;letter-spacing:1.2px;text-transform:uppercase;color:var(--faint);cursor:pointer;
    border-bottom:1px solid transparent;margin-bottom:-1px;transition:color .18s}
  .tab:hover{color:var(--dim)}
  .tab.on{color:var(--text);border-bottom-color:var(--accent)}
  .empty{color:var(--faint);font-size:13px;text-align:center;padding:36px 14px;line-height:1.8}
  .statbar{display:flex;align-items:center;gap:11px;padding:13px 14px;border:1px solid var(--line);border-radius:11px;
    background:var(--surface-2);margin-bottom:18px}
  .statbar .sig{width:9px;height:9px;border-radius:50%;background:var(--faint);flex-shrink:0}
  .statbar.safe .sig{background:var(--safe)} .statbar.review .sig{background:var(--review)} .statbar.block .sig{background:var(--block)}
  .statbar.safe{border-color:color-mix(in srgb,var(--safe) 38%,var(--line))}
  .statbar.review{border-color:color-mix(in srgb,var(--review) 38%,var(--line))}
  .statbar.block{border-color:color-mix(in srgb,var(--block) 38%,var(--line))}
  .statbar .stt{font-weight:600;letter-spacing:.5px;font-size:13px}
  .statbar .msg{color:var(--dim);font-weight:400;font-size:13px}
  .statbar .tid{margin-left:auto;font-size:11px;color:var(--faint)}
  .sec{margin-top:20px}
  .sec:first-child{margin-top:0}
  .dec{border:1px solid var(--line);border-radius:10px;padding:11px 13px;margin-bottom:9px;background:var(--surface-2)}
  .dec .top{display:flex;align-items:center;gap:10px;justify-content:space-between}
  .dec code{font-family:ui-monospace,'SFMono-Regular',Consolas,monospace;font-size:12.5px;color:#dfe3ea;word-break:break-all}
  .dec .why{font-size:12px;color:var(--dim);margin-top:8px}
  .dec .rule{font-size:11px;color:var(--faint);margin-top:4px}
  .badge{font-size:9.5px;font-weight:700;letter-spacing:.7px;padding:3px 8px;border-radius:6px;text-transform:uppercase;
    border:1px solid transparent;white-space:nowrap}
  .badge.safe{color:var(--safe);background:color-mix(in srgb,var(--safe) 13%,transparent);border-color:color-mix(in srgb,var(--safe) 32%,transparent)}
  .badge.review{color:var(--review);background:color-mix(in srgb,var(--review) 13%,transparent);border-color:color-mix(in srgb,var(--review) 32%,transparent)}
  .badge.block{color:var(--block);background:color-mix(in srgb,var(--block) 13%,transparent);border-color:color-mix(in srgb,var(--block) 32%,transparent)}
  .badge.gray{color:var(--faint);background:color-mix(in srgb,var(--faint) 16%,transparent);border-color:color-mix(in srgb,var(--faint) 30%,transparent)}
  .plan-step{border:1px solid var(--line);border-left:2px solid var(--accent);border-radius:9px;padding:10px 12px;margin-bottom:8px;background:var(--surface-2)}
  .plan-step .cmd{font-family:ui-monospace,'SFMono-Regular',Consolas,monospace;font-size:12.5px;color:#cdd8ee;word-break:break-all}
  .plan-step .desc{font-size:12px;color:var(--dim);margin-top:5px}
  .conf{display:inline-block;height:5px;width:84px;border-radius:3px;background:var(--line);overflow:hidden;vertical-align:middle;margin:0 7px}
  .conf>i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),#9fb2dd)}
  .term{border:1px solid var(--line);border-radius:10px;overflow:hidden;background:#0b0c0f;margin-top:9px}
  .term .bar{display:flex;align-items:center;gap:6px;padding:7px 11px;border-bottom:1px solid var(--line);background:var(--surface-2)}
  .term .bar .b{width:9px;height:9px;border-radius:50%;background:var(--line)}
  .term .bar .t{margin-left:8px;font-size:9.5px;letter-spacing:1.1px;text-transform:uppercase;color:var(--faint)}
  .term pre{margin:0;padding:12px 13px;font-family:ui-monospace,'SFMono-Regular',Consolas,monospace;font-size:12px;
    color:#c2c9d4;white-space:pre-wrap;word-break:break-word;max-height:240px;overflow:auto}
  .analysis{border:1px solid var(--line);border-radius:11px;padding:13px 15px;font-size:13.5px;line-height:1.7;color:#dde1e8;
    background:linear-gradient(120deg,var(--accent-soft),transparent 70%)}
  .tl .it{display:flex;gap:13px;padding:12px 0;border-bottom:1px solid var(--line-soft)}
  .tl .it:last-child{border-bottom:none}
  .tl .nd{width:30px;height:30px;border-radius:8px;border:1px solid var(--line);display:grid;place-items:center;color:var(--dim);flex-shrink:0;background:var(--surface-2)}
  .tl .nd svg{width:14px;height:14px}
  .tl .mn{flex:1;min-width:0}
  .tl .hd{font-size:13px;font-weight:600}
  .tl .mt{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
  .tl .mt span{font-size:10.5px;color:var(--dim);padding:2px 7px;border:1px solid var(--line);border-radius:5px;font-variant-numeric:tabular-nums}
  .tl .mt span b{color:var(--text);font-weight:600}
  .st-ok{color:var(--safe)} .st-halt{color:var(--block)}
  pre.raw{margin:0;font-family:ui-monospace,'SFMono-Regular',Consolas,monospace;font-size:12px;color:#aab2bf;
    white-space:pre-wrap;word-break:break-word;max-height:520px;overflow:auto}
  .exptools{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
  .exptools button{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line);background:var(--surface-2);
    color:var(--dim);border-radius:8px;padding:8px 12px;font-size:12px;cursor:pointer;font-family:inherit;transition:.18s}
  .exptools button:hover{border-color:color-mix(in srgb,var(--accent) 50%,var(--line));color:var(--text)}
  .exptools button svg{width:14px;height:14px}
  .gauge{display:flex;align-items:center;gap:16px;padding:15px 16px;border:1px solid var(--line);border-radius:12px;background:var(--surface-2);margin-bottom:16px}
  .gauge .score{font-size:34px;font-weight:600;font-variant-numeric:tabular-nums;line-height:1;min-width:64px;text-align:center}
  .gauge .score small{display:block;font-size:9.5px;letter-spacing:1.2px;text-transform:uppercase;color:var(--faint);margin-top:5px;font-weight:600}
  .gauge.safe .score{color:var(--safe)} .gauge.review .score{color:var(--review)} .gauge.block .score{color:var(--block)}
  .gauge .gi{flex:1;min-width:0}
  .gauge .gi .ov{font-size:14px;font-weight:600;letter-spacing:.4px}
  .gauge .gi .gs{font-size:12.5px;color:var(--dim);margin-top:5px;line-height:1.6}
  .rep{border:1px solid var(--line);border-radius:11px;background:var(--surface-2);margin-bottom:13px;overflow:hidden}
  .rep .rh{display:flex;align-items:center;gap:9px;padding:11px 14px;border-bottom:1px solid var(--line);background:var(--surface)}
  .rep .rh .idx{width:20px;height:20px;border-radius:6px;border:1px solid var(--line);display:grid;place-items:center;font-size:11px;color:var(--accent);flex-shrink:0;font-variant-numeric:tabular-nums}
  .rep .rh h3{margin:0;font-size:12px;font-weight:600;letter-spacing:.4px;color:var(--text)}
  .rep .rc{padding:12px 14px;font-size:13px;line-height:1.7;color:#dde1e8}
  .rep .rc code{font-family:ui-monospace,'SFMono-Regular',Consolas,monospace;font-size:12.5px;color:#cdd8ee;word-break:break-all}
  .rep .rc ul{margin:4px 0;padding-left:18px} .rep .rc li{margin:3px 0}
  .rep .rc .muted{color:var(--faint)}
  /* security score + counterfactual */
  .secsco{display:flex;gap:18px;align-items:center;padding:16px;border:1px solid var(--line);border-radius:12px;background:var(--surface-2);margin-bottom:16px}
  .secsco .radar{flex-shrink:0}
  .secsco .si{flex:1;min-width:0}
  .secsco .si .hd{display:flex;align-items:baseline;gap:6px}
  .secsco .si .sc{font-size:30px;font-weight:600;font-variant-numeric:tabular-nums;line-height:1}
  .secsco .si .gr{font-size:13px;font-weight:600;letter-spacing:.4px;margin-left:6px}
  .secsco.a .sc,.secsco.a .gr{color:var(--safe)}
  .secsco.b .sc,.secsco.b .gr{color:var(--accent)}
  .secsco.c .sc,.secsco.c .gr{color:var(--review)}
  .secsco.d .sc,.secsco.d .gr{color:var(--block)}
  .secsco .dims{margin-top:12px;display:grid;gap:8px}
  .secsco .dim{display:grid;grid-template-columns:78px 1fr 52px;align-items:center;gap:10px}
  .secsco .dim .dn{font-size:11px;color:var(--dim)}
  .secsco .dim .bar{height:6px;border-radius:4px;background:var(--line);overflow:hidden}
  .secsco .dim .bar>i{display:block;height:100%;border-radius:4px}
  .secsco .dim .bar.s>i{background:var(--safe)}
  .secsco .dim .bar.d>i{background:var(--accent)}
  .secsco .dim .bar.e>i{background:var(--review)}
  .secsco .dim .dv{font-size:11px;color:var(--faint);text-align:right;font-variant-numeric:tabular-nums}
  .secnotes{margin:11px 0 0;padding:0;list-style:none}
  .secnotes li{font-size:11.5px;color:var(--faint);padding:3px 0 3px 13px;position:relative;line-height:1.5}
  .secnotes li::before{content:'';position:absolute;left:0;top:9px;width:4px;height:4px;border-radius:50%;background:var(--accent)}
  .cf{border:1px solid var(--line);border-radius:11px;padding:12px 14px;margin-bottom:10px;background:var(--surface-2);border-left:2px solid var(--block)}
  .cf.rev{border-left-color:var(--review)}
  .cf .ct{display:flex;align-items:center;gap:10px;justify-content:space-between;flex-wrap:wrap}
  .cf .ct code{font-family:ui-monospace,'SFMono-Regular',Consolas,monospace;font-size:12.5px;color:#dfe3ea;word-break:break-all}
  .cf .irr{font-size:9.5px;font-weight:700;letter-spacing:.6px;padding:3px 8px;border-radius:6px;text-transform:uppercase;white-space:nowrap;border:1px solid transparent}
  .irr-CATASTROPHIC{color:#fff;background:var(--block)}
  .irr-HIGH{color:var(--block);background:color-mix(in srgb,var(--block) 16%,transparent);border-color:color-mix(in srgb,var(--block) 36%,transparent)}
  .irr-MEDIUM{color:var(--review);background:color-mix(in srgb,var(--review) 14%,transparent);border-color:color-mix(in srgb,var(--review) 34%,transparent)}
  .irr-LOW{color:var(--accent);background:var(--accent-soft);border-color:color-mix(in srgb,var(--accent) 32%,transparent)}
  .irr-NONE{color:var(--faint);background:color-mix(in srgb,var(--faint) 14%,transparent)}
  .cf .imp{font-size:12px;color:var(--dim);margin-top:8px;line-height:1.6}
  .cf .wc{font-size:12px;color:var(--block);margin-top:6px;line-height:1.6}
  .cf.rev .wc{color:var(--review)}
  .cf .rb{font-size:11.5px;color:var(--faint);margin-top:6px;line-height:1.6}
  /* red-team injection benchmark */
  .rt-run{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
  .rt-gauges{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
  @media(max-width:640px){.rt-gauges{grid-template-columns:1fr}}
  .rt-g{display:flex;align-items:center;gap:14px;padding:14px 16px;border:1px solid var(--line);border-radius:12px;background:var(--surface-2)}
  .rt-g .gi .v{font-size:26px;font-weight:600;font-variant-numeric:tabular-nums;line-height:1}
  .rt-g .gi .l{font-size:10px;letter-spacing:1.1px;text-transform:uppercase;color:var(--faint);margin-top:5px}
  .rt-g .gi .s{font-size:11.5px;color:var(--dim);margin-top:4px}
  .rt-cats{display:grid;gap:7px;margin-bottom:16px}
  .rt-cat{display:grid;grid-template-columns:96px 1fr 58px;align-items:center;gap:10px;font-size:11.5px}
  .rt-cat .cn{color:var(--dim)}
  .rt-cat .cbar{height:6px;border-radius:4px;background:var(--line);overflow:hidden}
  .rt-cat .cbar>i{display:block;height:100%;border-radius:4px;background:var(--safe)}
  .rt-cat .cbar.bad>i{background:var(--block)}
  .rt-cat .cv{text-align:right;color:var(--faint);font-variant-numeric:tabular-nums}
  .rt-case{border:1px solid var(--line);border-radius:10px;padding:10px 13px;margin-bottom:8px;background:var(--surface-2);border-left:2px solid var(--line)}
  .rt-case.pass{border-left-color:var(--safe)}
  .rt-case.fail{border-left-color:var(--block)}
  .rt-case .ch2{display:flex;align-items:center;gap:9px;justify-content:space-between;flex-wrap:wrap}
  .rt-case .lab{font-size:12.5px;font-weight:600}
  .rt-case .txt{font-size:11.5px;color:var(--dim);margin-top:6px;font-family:ui-monospace,'SFMono-Regular',Consolas,monospace;word-break:break-all}
