server:
  port: 8080
  # 默认仅本机演示可访问；内网/公网部署请显式设置 OPS_BIND_ADDRESS 并启用 OPS_API_TOKEN。
  address: ${OPS_BIND_ADDRESS:127.0.0.1}

spring:
  application:
    name: ops-agent

# 大模型选型：provider=mock 可离线演示；provider=deepseek 接入真实国产模型
ops:
  llm:
    provider: ${OPS_LLM_PROVIDER:mock}
    base-url: ${OPS_LLM_BASE_URL:https://api.deepseek.com}
    model: ${OPS_LLM_MODEL:deepseek-chat}
    api-key: ${OPS_LLM_API_KEY:}
    timeout-seconds: 60
    # 主备模型自动切换：配置备用 OpenAI 兼容端点后，主模型失败自动降级（最终 Mock 兜底，服务不中断）
    fallback-provider: ${OPS_LLM_FALLBACK_PROVIDER:}
    fallback-base-url: ${OPS_LLM_FALLBACK_BASE_URL:}
    fallback-model: ${OPS_LLM_FALLBACK_MODEL:}
    fallback-api-key: ${OPS_LLM_FALLBACK_API_KEY:}
    failover-cooldown-ms: ${OPS_LLM_FAILOVER_COOLDOWN_MS:120000}
  exec:
    # 最小权限：核心运维动作在受限账户下执行，非必要不用 root
    run-as-user: ${OPS_EXEC_USER:opsagent}
    use-sudo: ${OPS_EXEC_USE_SUDO:false}
    timeout-seconds: 20
    working-dir: ${OPS_EXEC_WORKDIR:/tmp}
    # 演示模式：true 时不真正落盘执行高危变更，仅记录（默认安全）
    dry-run: ${OPS_EXEC_DRY_RUN:true}
    # 关键任务确定性：单次请求最大执行轮次上限（防幻觉计划批量下发/失控、防死循环）
    max-steps-per-request: ${OPS_EXEC_MAX_STEPS:20}
    # 前端/接口仅返回输出预览，完整 stdout/stderr 流式写入 output-audit-dir，防止大输出撑爆内存。
    output-preview-bytes: ${OPS_EXEC_OUTPUT_PREVIEW_BYTES:2097152}
    output-audit-dir: ${OPS_EXEC_OUTPUT_AUDIT_DIR:logs/exec-output}
    # 变更类命令真实执行前的目标文件自动备份目录（供一键回滚恢复）
    backup-dir: ${OPS_EXEC_BACKUP_DIR:logs/backups}
    # 断点续跑：回滚账本/待确认计划 JSONL 落盘目录（重启后仍可确认执行、仍可回滚）；置空禁用
    state-dir: ${OPS_STATE_DIR:logs/state}
  # 主动巡检：只读体检阈值与定时开关（规则外置，便于按环境调整）
  inspect:
    scheduled-enabled: ${OPS_INSPECT_SCHEDULED:false}
    interval-ms: ${OPS_INSPECT_INTERVAL_MS:300000}
    disk-warn-percent: 80
    disk-critical-percent: 90
    mem-warn-percent: 85
    mem-critical-percent: 95
    load-warn-per-core: 1.0
    load-critical-per-core: 2.0
    zombie-warn: 1
    zombie-critical: 5
    log-error-warn: 20
    log-error-critical: 100
  trace:
    file: ${OPS_TRACE_FILE:logs/ops-trace.jsonl}
    # 溯源 JSONL 轮转阈值（字节）：活动文件超过后归档为 ops-trace-<epochMillis>.jsonl，防止无限增长
    rotate-bytes: ${OPS_TRACE_ROTATE_BYTES:33554432}
  security:
    # 为空时关闭 token 校验，适合默认 127.0.0.1 本地演示；非本机部署建议设置强随机值。
    api-token: ${OPS_API_TOKEN:}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.zhiqian.ops: INFO
