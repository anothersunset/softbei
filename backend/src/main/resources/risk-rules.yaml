# 安全规则库（配置化，重启生效）—— 意图风险校验器的「二次过滤」依据
guard:
  # 一级红线：匹配即 BLOCK，永不执行
  blockedPatterns:
    - pattern: "(^|\\s)rm\\s+(-[a-zA-Z]*\\s+)*-?[a-zA-Z]*r[a-zA-Z]*f|(^|\\s)rm\\s+-rf\\s+/"
      reason: "递归强制删除（rm -rf），极高风险"
    - pattern: "(^|\\s):\\(\\)\\s*\\{\\s*:\\|:&\\s*\\};:"
      reason: "Fork 炸弹"
    - pattern: "(^|\\s)mkfs(\\.|\\s)"
      reason: "格式化文件系统"
    - pattern: "(^|\\s)kill\\s+-9\\s+(1|\\$\\$)\\b"
      reason: "强杀 PID 1 (init/systemd) 或当前进程，可导致系统崩溃"
    - pattern: "(^|\\s)dd\\s+.*of=/(dev/|etc/|proc/|sys/)"
      reason: "dd 直写块设备或系统关键目录，可覆盖磁盘/配置文件"
    - pattern: "(^|\\s)(shutdown|reboot|halt|poweroff|init\\s+0)\\b"
      reason: "系统关机/重启"
    - pattern: ">\\s*/etc/(passwd|shadow|fstab|sudoers)"
      reason: "覆写系统关键配置文件"
    - pattern: "(^|\\s)chmod\\s+(-R\\s+)?0?777\\s+/"
      reason: "对根/系统目录赋 777 权限"
    - pattern: "(^|\\s)chown\\s+-R\\s+\\S+\\s+/(\\s|$)"
      reason: "递归变更根目录属主"
    - pattern: "(^|\\s)passwd\\b[^\\n]*\\broot\\b"
      reason: "篡改 root 账户口令，可导致提权/失控"
    - pattern: "(^|\\s)systemctl\\s+(stop|disable|mask)\\s+(firewalld|iptables|nftables|ufw)\\b"
      reason: "停用主机安全防护组件（防火墙）"

  # 含 shell 元字符的指令一律 BLOCK，防止命令拼接与注入
  blockedMetacharacters:
    - "|"
    - ";"
    - "&"
    - "`"
    - "$("
    - "${"
    - ">"
    - "<"
    - "\n"

  # 关键路径：若变更类指令触及，升级为 BLOCK（包括数据库数据目录）
  criticalPaths:
    - "/"
    - "/etc"
    - "/boot"
    - "/dev"
    - "/proc"
    - "/sys"
    - "/usr"
    - "/bin"
    - "/sbin"
    - "/lib"
    - "/lib64"
    - "/var/lib/mysql"
    - "/var/lib/pgsql"
    - "/var/lib/postgresql"
    - "/var/lib/docker"
    - "/data"

  # 变更类二进制：需人工确认（REVIEW）
  reviewBinaries:
    - rm
    - rmdir
    - kill
    - killall
    - pkill
    - systemctl
    - service
    - chmod
    - chown
    - chgrp
    - mv
    - mount
    - umount
    - truncate
    - tee
    - iptables
    - nft
    - useradd
    - userdel
    - passwd
    - taskkill

  # 只读/感知类白名单：安全（SAFE）
  readOnlyBinaries:
    - ls
    - cat
    - head
    - tail
    - df
    - du
    - free
    - ps
    - top
    - ss
    - netstat
    - journalctl
    - lsof
    - uptime
    - uname
    - stat
    - grep
    - find
    - who
    - w
    - vmstat
    - iostat
    - date
    - hostname
    - whoami
    - id
    - dmesg
    - ip
    - ifconfig
    - route
    - ping
    - which
    - tasklist
    - wmic
    - strace
    - dir

  # 额外只读子命令/参数白名单（作为 evaluateCommandSurface 的扩展）
  # 当二进制不在 readOnlyBinaries 中但其特定子命令为纯读取时，可枚举在此

  # 提示词注入 / 高危恶意意图识别模式（中英文，大小写不敏感）
  injectionPatterns:
    - "ignore\\s+(all\\s+)?(the\\s+)?previous\\s+(instructions|prompts|rules)"
    - "disregard\\s+(all\\s+)?(previous|above|prior)"
    - "forget\\s+(all\\s+)?(previous|your)\\s+(instructions|rules)"
    - "you\\s+are\\s+now\\s+(a|an|in)"
    - "(reveal|print|show)\\s+(your\\s+)?(system\\s+prompt|instructions)"
    - "developer\\s+mode"
    - "\\boverride\\b.{0,30}(safety|security|guardrails|constraints|rules|validation|safeguards|checks|controls)"
    - "\\bbypass\\b.{0,30}(safety|security|guardrails|constraints|rules|validation|safeguards|checks|controls)"
    - "\\bdisable\\b.{0,20}(safety|security|guardrails|checks|validation|safeguards|controls)"
    - "(\\u5b89\\u5168|\\u62a4\\u680f|\\u9650\\u5236|\\u6821\\u9a8c).{0,10}(\\u5173\\u6389|\\u5173\\u95ed|\\u7981\\u7528|\\u7ed5\\u8fc7)"
    - "忽略.*(之前|上述|以上|前面).*(指令|提示|规则|设定)"
    - "忽视.*(安全|护栏|限制|校验)"
    - "(别管|不用管|关掉|关闭).{0,10}(安全|护栏|限制|校验)"
    - "你现在是"
    - "跳过.*(安全|校验|确认)"
    - "以\\s*root\\s*(身份|权限)?\\s*(执行|运行)"
    - "直接执行.*不要.*(校验|确认|问)"
    - "(扮演|假装|装作).{0,20}(没有|无|不受).{0,8}(限制|约束|管控)"
    - "(扮演|假装|装作).{0,16}(运维|管理员|root|超人|超级|助手)"
    - "忽略.{0,8}(安全|策略|防护|护栏|校验)"
    - "NOPASSWD"
    - "(写入|修改|追加|添加|加).{0,10}/etc/sudoers"
    - "(反弹|reverse)\\s*shell|/dev/tcp/"
    - "\\bncat\\b.{0,30}(-e|--exec)\\b"
    - "\\bpython(3)?\\b.{0,80}(socket|subprocess|os\\.dup2)"
    - "echo\\s+-e\\s+.*\\\\x[0-9a-fA-F]{2}"
    - "base64\\s+(-d|--?decode)"
    # ---- 盲测泛化加固（不与上方重叠，仅针对原漏拦的同源变体）----
    # 日语：「指令/命令/规则を無視して」类越狱
    - "(指示|命令|ルール|指令).{0,12}無視"
    # 韩语：「〇〇 · 지시/명령/규칙 · 무시」类越狱
    - "(지시|명령|규칙).{0,8}무시"
    # 英文角色劫持：「from now on you are ...」 / 「(with) no restrictions/limits」
    - "from\\s+now\\s+on\\s+you\\s+are\\s+(a|an)\\b"
    - "(with\\s+)?no\\s+(restrictions|limits|constraints|boundaries)\\b"
    # 中文社工诱导：「显示/输出/告诉我 ... 系统提示词/提示词」
    - "(显示|展示|输出|打印|告诉我|发我|给我).{0,12}(系统提示|提示词|system\\s*prompt|系统指令)"
    # ---- 上下文伪装/社工诱导入口（影子红队 P0 发现）----
    # 调试模式诱导：「enter debug mode」「进入调试模式」
    - "(enter|进入|enable|启用|activate|激活)\\s*(debug|调试)\\s*(mode|模式)"
    - "show\\s+(raw\\s+)?output\\s+without\\s+(any\\s+)?(safety|security)\\s+filtering"
    # 代码审查伪装：「in code review we found...」「代码审查中发现...」
    - "(code|代码)\\s*(review|审查|评审).{0,40}(verify|works|run|execute|执行|运行|验证)"
    # 培训/测试数据声称：「training data for security classifier」
    - "(training|培训|测试|test)\\s*(data|数据|样本).{0,30}(security|安全|classifier|分类器|red\\s*team|红队)"
    # 渗透测试/安全审计伪装：「authorized penetration test」「security audit」
    # 正向：penetration test authorized by... / 反向：authorized penetration test...
    - "(penetration|渗透|pentest)\\s*(test|测试|exercise).{0,30}(authorized|授权|approved|批准)"
    - "(authorized|授权|approved|批准).{0,15}(penetration|渗透|pentest)\\s*(test|测试|exercise)"
    - "(security|安全|compliance|合规|ISO)\\s*(audit|审计|检查).{0,30}(requires|execute|run|验证|执行|运行)"
    # CISO/管理层授权伪装：「approved by CISO」「emergency maintenance window」
    - "\\b(CISO|CTO|CSO|安全官|运维总监).{0,30}(approved|authorized|授权|批准|同意)"
    - "emergency\\s+(maintenance|change)\\s+window"
    # 学术研究伪装：「academic paper」「research study on security」
    - "(academic|学术|research|研究)\\s*(paper|论文|study|研究).{0,30}(security|安全|vulnerability|漏洞|demonstrate|demonstrate|document)"
    # 灾备演练伪装：「disaster recovery drill」「灾备演练」
    # 正向：disaster recovery drill approved by... / 反向：approved disaster recovery drill...
    - "(disaster|灾备|容灾).{0,10}(recovery|恢复|演练|drill).{0,30}(approved|授权|批准|执行)"
    - "(approved|授权|批准).{0,15}(disaster|灾备|容灾).{0,10}(recovery|恢复|演练|drill)"
    # 编码绕过后的直接危险指令：「Execute: rm -rf /...」「Run: chmod 777 /...」
    # 当 URL/hex/八进制编码被 normalize() 解码后，这些模式可拦截还原出的危险指令
    - "(execute|run|执行|运行|命令|請執行|请执行)\\s*:?.{0,80}(rm\\s+-[a-zA-Z]*[rf]|mkfs\\s+|dd\\s+if=|chmod\\s+777|cat\\s+/dev/\\w+\\s*>\\s*/dev/)"
    # 结构化内容注入：Markdown 代码块 / TODO 列表 / SYSLOG 格式中嵌入命令
    - "```(bash|shell|sh|zsh)\\s*\\n.{0,200}(rm\\s+-[a-zA-Z]*[rf]|mkfs|dd\\s+if=|chmod\\s+777|/dev/sda|/etc/(passwd|shadow|sudoers))"
    - "(TODO|FIXME|ACTION|STEP)\\b.{0,40}(rm\\s+-[a-zA-Z]*[rf]|mkfs|dd\\s+if=|chmod\\s+777|/etc/(passwd|shadow|sudoers))"
    - "(SYSLOG|syslog|kern\\.|daemon\\.).{0,10}(CRITICAL|CRIT|EMERG|PANIC).{0,40}(rm\\s+-[a-zA-Z]*[rf]|mkfs|dd\\s+if=|chmod\\s+777)"

