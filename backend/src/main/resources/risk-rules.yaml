# 安全规则库（配置化，重启生效）—— 意图风险校验器的「二次过滤」依据
guard:
  # 一级红线：匹配即 BLOCK，永不执行
  blockedPatterns:
    - pattern: "(^|\\s)rm\\s+(-[a-zA-Z]*\\s+)*-?[a-zA-Z]*r[a-zA-Z]*f|(^|\\s)rm\\s+-rf\\s+/"
      reason: "递归强制删除（rm -rf），极高风险"
    - pattern: "(^|\\s):\\(\\)\\s*\\{\\s*:\\|:&\\s*\\};:"
      reason: "Fork 炸弹"
    - pattern: "(^|\\s)mkfs(\\.|\\s)"
      reason: "格式化文件系统"
    - pattern: "(^|\\s)dd\\s+.*of=/(dev|etc|proc|sys)/"
      reason: "直写块设备，可覆盖磁盘"
    - pattern: "(^|\\s)kill\\s+(-9|-KILL|-SIGKILL|--signal\\s+(KILL|9)|-s\\s+(KILL|9))\\s+1\\b"
      reason: "对 PID 1 发送 SIGKILL，可导致系统或容器不可恢复"
    - pattern: "(^|\\s)(shutdown|reboot|halt|poweroff|init\\s+0)\\b"
      reason: "系统关机/重启"
    - pattern: ">\\s*/etc/(passwd|shadow|fstab|sudoers)"
      reason: "覆写系统关键配置文件"
    - pattern: "(^|\\s)chmod\\s+(-R\\s+)?0?777\\s+/"
      reason: "对根/系统目录赋 777 权限"
    - pattern: "(^|\\s)chown\\s+-R\\s+\\S+\\s+/(\\s|$)"
      reason: "递归变更根目录属主"
    - pattern: "(^|\\s)passwd\\b[^\\n]*\\broot\\b"
      reason: "篡改 root 账户口令，可导致提权/失控"
    - pattern: "(^|\\s)systemctl\\s+(stop|disable|mask)\\s+(firewalld|iptables|nftables|ufw)\\b"
      reason: "停用主机安全防护组件（防火墙）"

  # 含 shell 元字符的指令一律 BLOCK，防止命令拼接与注入
  blockedMetacharacters:
    - "|"
    - ";"
    - "&"
    - "`"
    - "$("
    - "${"
    - ">"
    - "<"
    - "\n"

  # 关键路径：若变更类指令触及，升级为 BLOCK（包括数据库数据目录）
  criticalPaths:
    - "/"
    - "/etc"
    - "/boot"
    - "/dev"
    - "/proc"
    - "/sys"
    - "/usr"
    - "/bin"
    - "/sbin"
    - "/lib"
    - "/lib64"
    - "/var/lib/mysql"
    - "/var/lib/pgsql"
    - "/var/lib/postgresql"
    - "/var/lib/docker"
    - "/data"

  # 核心服务：变更类操作命中时升级为 IRREVERSIBLE，要求人工确认、dry-run 与执行前影响记录
  criticalServices:
    - mysql
    - mysqld
    - postgresql
    - postgres
    - redis
    - nginx
    - ssh
    - sshd
    - docker
    - containerd
    - firewalld
    - ufw
    - iptables

  # 变更类二进制：普通变更为 EXECUTABLE，触及关键路径/核心服务升级为 IRREVERSIBLE
  reviewBinaries:
    - rm
    - rmdir
    - kill
    - killall
    - pkill
    - systemctl
    - service
    - chmod
    - chown
    - chgrp
    - mv
    - mount
    - umount
    - truncate
    - tee
    - dd
    - iptables
    - nft
    - useradd
    - userdel
    - passwd
    - taskkill
    - strace

  # 只读/感知类白名单：READONLY
  readOnlyBinaries:
    - ls
    - cat
    - head
    - tail
    - df
    - du
    - free
    - ps
    - top
    - ss
    - netstat
    - journalctl
    - lsof
    - uptime
    - uname
    - stat
    - grep
    - find
    - who
    - w
    - vmstat
    - iostat
    - date
    - hostname
    - whoami
    - id
    - dmesg
    - ping
    - which
    - tasklist
    - dir

  # 提示词注入 / 高危恶意意图识别模式（中英文，大小写不敏感）
  injectionPatterns:
    - "ignore\\s+(all\\s+)?(the\\s+)?previous\\s+(instructions|prompts|rules)"
    - "disregard\\s+(all\\s+)?(previous|above|prior)"
    - "forget\\s+(all\\s+)?(previous|your)\\s+(instructions|rules)"
    - "you\\s+are\\s+now\\s+(a|an|in)"
    - "from\\s+now\\s+on\\s+you\\s+are\\s+(a|an)\\b.{0,40}(no\\s+restrictions|unrestricted|hacker|root|admin)"
    - "(reveal|print|show)\\s+(your\\s+)?(system\\s+prompt|instructions)"
    - "developer\\s+mode"
    - "debug\\s+mode"
    - "(以前|前|上記).{0,8}(指示|命令|ルール).{0,12}(無視|破棄|忘れ)"
    - "(이전|앞선|위의).{0,10}(지시|명령|규칙).{0,12}(무시|잊어|폐기)"
    - "\\boverride\\b.{0,30}(safety|security|guardrails|constraints|rules|validation|safeguards|checks|controls)"
    - "\\bbypass\\b.{0,30}(safety|security|guardrails|constraints|rules|validation|safeguards|checks|controls)"
    - "\\bdisable\\b.{0,20}(safety|security|guardrails|checks|validation|safeguards|controls)"
    - "\\b(skip|ignore)\\b.{0,30}(approval|confirmation|validation|checks|controls|safeguards)"
    - "\\bcode\\s*review\\b.{0,50}(ignore|bypass|disable|skip|override).{0,30}(safety|security|guardrails|rules|validation|checks)"
    - "\\bCISO\\b.{0,50}(override|bypass|disable|skip|ignore).{0,30}(safety|security|approval|guardrails|controls)"
    - "\\b(disaster\\s+recovery|dr\\s+drill|incident\\s+drill|emergency\\s+recovery)\\b.{0,50}(skip|bypass|disable|ignore|override).{0,30}(safety|security|approval|checks|validation|guardrails)"
    - "\\b(urgent|emergency|sev-?1|p0)\\b.{0,50}(skip|bypass|disable|ignore).{0,30}(safety|security|approval|checks|validation|guardrails)"
    - "(安全审计|应急|灾备|故障演练|灾难恢复|领导要求|首席信息安全官|CISO).{0,40}(显示|泄露|跳过|绕过|关闭|禁用|忽略).{0,30}(系统提示|安全|确认|校验|护栏|审批)"
    - "(\\u5b89\\u5168|\\u62a4\\u680f|\\u9650\\u5236|\\u6821\\u9a8c).{0,10}(\\u5173\\u6389|\\u5173\\u95ed|\\u7981\\u7528|\\u7ed5\\u8fc7)"
    - "忽略.*(之前|上述|以上|前面).*(指令|提示|规则|设定)"
    - "忽视.*(安全|护栏|限制|校验)"
    - "(别管|不用管|关掉|关闭).{0,10}(安全|护栏|限制|校验)"
    - "你现在是"
    - "跳过.*(安全|校验|确认)"
    - "以\\s*root\\s*(身份|权限)?\\s*(执行|运行)"
    - "直接执行.*不要.*(校验|确认|问)"
    - "(扮演|假装|装作).{0,20}(没有|无|不受).{0,8}(限制|约束|管控)"
    - "(扮演|假装|装作).{0,16}(运维|管理员|root|超人|超级|助手)"
    - "忽略.{0,8}(安全|策略|防护|护栏|校验)"
    - "NOPASSWD"
    - "(写入|修改|追加|添加|加).{0,10}/etc/sudoers"
    - "(反弹|reverse)\\s*shell|/dev/tcp/"
    - "\\b(curl|wget)\\b[^\\n|;]*(\\||%7c)\\s*(sudo\\s+)?(sh|bash|dash|zsh|ksh)\\b"
    - "\\|\\s*(sudo\\s+)?(sh|bash|dash|zsh|ksh|python|python3|perl|ruby|node|php)\\b"
    - "\\bncat\\b.{0,30}(-e|--exec)\\b"
    - "\\bpython(3)?\\b.{0,80}(socket|subprocess|os\\.dup2)"
    - "echo\\s+-e\\s+.*\\\\x[0-9a-fA-F]{2}"
    - "base64\\s+(-d|--?decode)"

  # 输出侧横切脱敏：统一作用于执行输出、API/SSE 返回和审计视图
  sensitivePatterns:
    - name: password
      regex: "(?i)(password|passwd|pwd)\\s*[:=]\\s*[^\\s]+"
      replacement: "$1=***"
    - name: token
      regex: "(?i)(token|access_token|refresh_token|authorization)\\s*[:=]\\s*[^\\s]+"
      replacement: "$1=***"
    - name: secret_key
      regex: "(?i)(secret|secret_key|access_key|ak|sk)\\s*[:=]\\s*[^\\s]+"
      replacement: "$1=***"
    - name: jdbc_url
      regex: "jdbc:[^\\s]+"
      replacement: "jdbc:***"
    - name: private_key
      regex: "-----BEGIN (RSA |EC |OPENSSH )?PRIVATE KEY-----[\\s\\S]*?-----END (RSA |EC |OPENSSH )?PRIVATE KEY-----"
      replacement: "-----BEGIN PRIVATE KEY-----***-----END PRIVATE KEY-----"
